name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling and core deps
        run: |
          python -m pip install --upgrade pip
          # The pure-logic suite needs only numpy + Pillow plus the dev tools.
          # Heavy, hardware-facing deps (mediapipe/opencv/customtkinter) are not
          # installed in CI; the package is structured so they aren't imported
          # by the tests or the type-checked core.
          pip install numpy pillow pytest ruff black mypy

      - name: Ruff (lint)
        run: ruff check gesturecam tests

      - name: Black (format check)
        run: black --check gesturecam tests

      - name: mypy (type-check core)
        run: |
          mypy gesturecam/config gesturecam/gestures gesturecam/quality \
               gesturecam/face gesturecam/storage gesturecam/models \
               gesturecam/errors.py gesturecam/paths.py

      - name: pytest
        run: pytest
